<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="assets/hunnids%20shape%20files/favicon-32.png">
  <link rel="apple-touch-icon" href="assets/hunnids%20shape%20files/favicon-180.png">
  <title>hunnids* / tutorials</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&family=Nunito:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

    :root {
      --bg: #eef1f5;
      --bg-card: rgba(255,255,255,0.62);
      --bg-hover: rgba(255,255,255,0.85);
      --border: rgba(255,255,255,0.55);
      --border-hover: rgba(140,150,165,0.35);
      --text-primary: #2c313a;
      --text-secondary: #6b7280;
      --text-muted: #a4acb8;
      --brown: #3a3f4a;
      --brown-dim: #21242c;
      --brown-light: #707a8a;
      --shadow-soft: 0 8px 30px rgba(40,45,60,0.08);
      --shadow-pop: 0 14px 40px rgba(40,45,60,0.14);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      background-image:
        radial-gradient(circle at 12% 10%, rgba(173,196,230,0.55) 0%, transparent 45%),
        radial-gradient(circle at 88% 18%, rgba(210,190,230,0.40) 0%, transparent 45%),
        radial-gradient(circle at 30% 85%, rgba(180,220,215,0.40) 0%, transparent 45%),
        radial-gradient(circle at 90% 90%, rgba(230,200,200,0.30) 0%, transparent 45%);
      background-attachment: fixed;
      color: var(--text-primary);
      font-family: 'Nunito', sans-serif;
      font-size: 14px;
      line-height: 1.6;
      min-height: 100vh;
    }

    body.dark-mode {
      --bg: #0f1117;
      --bg-card: rgba(22,27,40,0.75);
      --bg-hover: rgba(30,36,54,0.9);
      --border: rgba(255,255,255,0.08);
      --border-hover: rgba(255,255,255,0.15);
      --text-primary: #e8eaf0;
      --text-secondary: #8892a4;
      --text-muted: #4a5268;
      --brown: #8ba0c4;
      --brown-dim: #c4d4f0;
      --brown-light: #5a7aaa;
      --shadow-soft: 0 8px 30px rgba(0,0,0,0.3);
      --shadow-pop: 0 14px 40px rgba(0,0,0,0.5);
    }

    body.dark-mode {
      background-image:
        radial-gradient(circle at 12% 10%, rgba(40,60,120,0.35) 0%, transparent 45%),
        radial-gradient(circle at 88% 18%, rgba(60,40,100,0.25) 0%, transparent 45%),
        radial-gradient(circle at 30% 85%, rgba(20,60,80,0.25) 0%, transparent 45%),
        radial-gradient(circle at 90% 90%, rgba(50,30,60,0.2) 0%, transparent 45%);
    }

    /* ── HEADER ── */
    header {
      position: sticky;
      top: 0;
      background: var(--bg);
      backdrop-filter: blur(16px) saturate(160%);
      border-bottom: 1px solid var(--border);
      padding: 0 48px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 100;
      box-shadow: var(--shadow-soft);
    }

    body.dark-mode header {
      background: rgba(12,15,26,0.88);
    }

    .header-left { display: flex; align-items: center; gap: 16px; }

    .back-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 13px;
      color: var(--text-secondary);
      text-decoration: none;
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid var(--border-hover);
      background: rgba(255,255,255,0.5);
      transition: all 0.15s;
    }
    .back-btn:hover { color: var(--brown-dim); background: rgba(255,255,255,0.9); }

    .breadcrumb {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--text-secondary);
    }
    .breadcrumb span { color: var(--brown); }

    .dark-toggle {
      width: 36px; height: 36px; border-radius: 50%;
      border: 1px solid var(--border-hover);
      background: rgba(255,255,255,0.5);
      cursor: pointer; display: flex; align-items: center;
      justify-content: center; font-size: 16px; transition: all 0.2s;
    }
    .dark-toggle:hover { background: rgba(255,255,255,0.9); transform: scale(1.08); }

    /* ── MAIN ── */
    .page-wrap {
      max-width: 1400px;
      margin: 0 auto;
      padding: 48px 48px 80px;
    }

    .page-eyebrow {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--brown-light);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .page-title {
      font-family: 'Quicksand', sans-serif;
      font-size: 36px;
      font-weight: 700;
      color: var(--brown-dim);
      margin-bottom: 6px;
    }
    .page-title span { color: var(--brown-light); }

    .page-desc {
      font-size: 14px;
      color: var(--text-secondary);
      margin-bottom: 36px;
    }

    /* ── FILTER PILLS ── */
    .filters {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 28px;
    }

    .filter-pill {
      font-family: 'Nunito', sans-serif;
      font-size: 12.5px;
      font-weight: 700;
      padding: 7px 18px;
      border-radius: 20px;
      border: 1px solid var(--border-hover);
      background: rgba(255,255,255,0.5);
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.15s;
    }
    .filter-pill:hover { border-color: var(--brown-light); color: var(--brown-dim); background: rgba(255,255,255,0.85); }
    .filter-pill.active {
      background: linear-gradient(135deg, var(--brown-light), var(--brown));
      border-color: var(--brown);
      color: #fff;
      box-shadow: var(--shadow-soft);
    }
    body.dark-mode .filter-pill { background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.12); }

    .tutorial-search {
      width: 100%;
      padding: 10px 18px;
      border-radius: 20px;
      border: 1px solid var(--border-hover);
      background: rgba(255,255,255,0.6);
      font-family: 'Nunito', sans-serif;
      font-size: 13.5px;
      font-weight: 600;
      color: var(--text-primary);
      outline: none;
      margin-bottom: 10px;
      transition: border-color 0.15s, background 0.15s;
    }
    .tutorial-search:focus { border-color: var(--brown-light); background: rgba(255,255,255,0.95); }
    .tutorial-search::placeholder { color: var(--text-secondary); }

    body.dark-mode .tutorial-search { background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.12); }
    body.dark-mode .tutorial-search:focus { background: rgba(255,255,255,0.1); border-color: var(--brown-light); }
    body.dark-mode .back-btn {
      background: rgba(255,255,255,0.06);
      border-color: rgba(255,255,255,0.12);
      color: var(--text-secondary);
    }

    /* Featured banner */
    .featured-banner {
      display: flex;
      align-items: center;
      position: relative;
      border-radius: 20px;
      overflow: hidden;
      height: 180px;
      text-decoration: none;
      cursor: pointer;
      box-shadow: var(--shadow-pop);
      transition: transform 0.2s;
      margin-bottom: 28px;
    }
    .featured-banner:hover { transform: translateY(-2px); }
    .featured-banner-bg {
      position: absolute; inset: 0; width: 100%; height: 100%;
      object-fit: cover; opacity: 0.7; transition: opacity 0.2s, transform 0.3s;
    }
    .featured-banner:hover .featured-banner-bg { opacity: 0.5; transform: scale(1.03); }
    .featured-banner-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(90deg, rgba(10,12,22,0.88) 0%, rgba(10,12,22,0.45) 65%, rgba(10,12,22,0.1) 100%);
    }
    .featured-banner-content { position: relative; z-index: 2; padding: 0 32px; flex: 1; }
    .featured-banner-play {
      position: relative; z-index: 2; width: 56px; height: 56px; border-radius: 50%;
      background: rgba(255,255,255,0.9); display: flex; align-items: center;
      justify-content: center; margin-right: 32px; font-size: 20px; flex-shrink: 0;
      transition: transform 0.2s, background 0.2s;
    }
    .featured-banner:hover .featured-banner-play { transform: scale(1.1); background: #fff; }

    /* Video grid */
    .video-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 16px;
    }

    .pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 6px;
      margin-top: 32px;
    }

    .page-btn {
      min-width: 34px;
      height: 34px;
      padding: 0 10px;
      border-radius: 10px;
      border: 1px solid var(--border-hover);
      background: var(--bg-card);
      color: var(--text-primary);
      font-family: 'Nunito', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }
    .page-btn:hover:not(:disabled) { background: rgba(255,255,255,0.85); border-color: var(--brown-light); }
    .page-btn.active { background: var(--brown); color: #fff; border-color: var(--brown); }
    .page-btn:disabled { opacity: 0.35; cursor: default; }

    body.dark-mode .page-btn { background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.12); }
    body.dark-mode .page-btn:hover:not(:disabled) { background: rgba(255,255,255,0.1); }

    .video-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 18px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.18s, box-shadow 0.18s, border-color 0.18s;
      display: flex;
      flex-direction: column;
      backdrop-filter: blur(12px);
    }
    .video-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-pop); border-color: var(--brown-light); }
    .video-card.hidden { display: none; }

    body.dark-mode .video-card { background: rgba(255,255,255,0.05); }
    body.dark-mode .video-card:hover { background: rgba(255,255,255,0.09); }

    .video-thumb {
      position: relative;
      width: 100%;
      padding-top: 56.25%;
      background: #111;
      overflow: hidden;
    }

    .video-thumb img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.25s;
    }
    .video-card:hover .video-thumb img { transform: scale(1.05); }

    .video-thumb-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Quicksand', sans-serif;
      font-weight: 700;
      font-size: 14px;
      letter-spacing: 0.5px;
      color: #fff;
      transition: transform 0.25s;
    }
    .video-card:hover .video-thumb-placeholder { transform: scale(1.05); }
    .video-thumb-placeholder-tiktok { background: linear-gradient(135deg, #010101, #25F4EE 0%, #010101 40%, #FE2C55 100%); }
    .video-thumb-placeholder-file { background: linear-gradient(135deg, #3a3f4a, #5a6072); }

    .video-thumb-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }
    .video-card:hover .video-thumb-overlay { background: rgba(0,0,0,0.28); }

    .video-play {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: rgba(255,255,255,0.92);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      opacity: 0;
      transform: scale(0.8);
      transition: opacity 0.2s, transform 0.2s;
    }
    .video-card:hover .video-play { opacity: 1; transform: scale(1); }

    .video-soft-tag {
      position: absolute;
      top: 8px;
      left: 8px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      font-weight: 700;
      color: #fff;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(4px);
      border-radius: 6px;
      padding: 2px 7px;
    }

    .video-info {
      padding: 12px 16px 16px;
      flex: 1;
    }

    .video-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--text-primary);
      line-height: 1.4;
      margin-bottom: 6px;
    }

    .video-cat {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--text-muted);
    }

    /* ── VIDEO MODAL ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 999;
      background: rgba(10,12,22,0.75);
      backdrop-filter: blur(8px);
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }

    .modal {
      background: rgba(20,24,40,0.97);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 24px;
      width: 760px;
      max-width: 92vw;
      overflow: hidden;
      box-shadow: 0 24px 60px rgba(0,0,0,0.6);
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 22px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .modal-title {
      font-family: 'Quicksand', sans-serif;
      font-size: 15px;
      font-weight: 700;
      color: #fff;
      flex: 1;
      margin-right: 12px;
    }

    .modal-close {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: rgba(255,255,255,0.5);
      cursor: pointer;
      padding: 4px 10px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.15);
      transition: all 0.15s;
      white-space: nowrap;
    }
    .modal-close:hover { background: rgba(255,255,255,0.1); color: #fff; }

    .modal-embed {
      position: relative;
      width: 100%;
      padding-top: 56.25%;
    }
    .modal-embed iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
    }

    /* Vertical (TikTok-style) modal */
    .modal.modal-vertical {
      width: 380px;
    }
    .modal.modal-vertical .modal-embed {
      padding-top: 0;
      height: 80vh;
      max-height: 780px;
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-thumb { background: var(--border-hover); border-radius: 4px; }

    /* ── MOBILE LAYOUT (≤768px) ── */
    @media (max-width: 768px) {
      body { zoom: 0.9; }

      header { padding: 0 16px; }
      .breadcrumb { display: none; }
      .header-left { gap: 10px; }
      .back-btn { padding: 6px 10px; font-size: 12px; }

      .page-wrap { padding: 24px 16px 60px; }
      .page-title { font-size: 26px; }

      .featured-banner {
        height: auto;
        flex-direction: column;
        align-items: flex-start;
        padding: 20px;
      }
      .featured-banner-content { padding: 0; margin-bottom: 16px; }
      .featured-banner-play { margin-right: 0; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <a href="index.html" class="back-btn">← Back</a>
    <div class="breadcrumb">hunnids<span>*</span> / tutorials</div>
  </div>
  <button class="dark-toggle" onclick="toggleDark()" id="dark-toggle" title="Toggle dark mode">🌙</button>
</header>

<div class="page-wrap">
  <div class="page-eyebrow">// video library</div>
  <div class="page-title">Tutorials<span>*</span></div>
  <div class="page-desc">Curated tutorials for editors. Click any to watch.</div>

  <!-- Featured video banner -->
  <a href="https://www.youtube.com/watch?v=ASRhzm6u5Vw" target="_blank" class="featured-banner">
    <img src="https://img.youtube.com/vi/ASRhzm6u5Vw/hqdefault.jpg" alt="Featured" class="featured-banner-bg" />
    <div class="featured-banner-overlay"></div>
    <div class="featured-banner-content">
      <div style="font-family:'JetBrains Mono',monospace; font-size:10px; color:rgba(255,255,255,0.6); letter-spacing:1.5px; text-transform:uppercase; margin-bottom:8px;">// featured guide</div>
      <div style="font-family:'Quicksand',sans-serif; font-size:26px; font-weight:700; color:#fff; margin-bottom:6px;">Learn After Effects in 10 Minutes</div>
      <div style="font-size:13px; color:rgba(255,255,255,0.7);">Perfect starting point for editors — covers the essentials fast.</div>
    </div>
    <div class="featured-banner-play">▶</div>
  </a>

  <div class="filters">
    <input type="text" id="tutorial-search" class="tutorial-search" placeholder="Search tutorials..." oninput="searchTutorials(this.value)" />
    <button class="filter-pill active" onclick="filterVids('all', this)">All</button>
    <button class="filter-pill" onclick="filterVids('basics', this)">Basics</button>
    <button class="filter-pill" onclick="filterVids('motion', this)">Motion Graphics</button>
    <button class="filter-pill" onclick="filterVids('text', this)">Text & Titles</button>
    <button class="filter-pill" onclick="filterVids('transitions', this)">Transitions</button>
    <button class="filter-pill" onclick="filterVids('glitch', this)">Glitch & CRT</button>
    <button class="filter-pill" onclick="filterVids('amv-style', this)">AMV Style</button>
    <button class="filter-pill" onclick="filterVids('effects-create', this)">Effects</button>
    <button class="filter-pill" onclick="filterVids('logos-intros', this)">Logos & Intros</button>
    <button class="filter-pill" onclick="filterVids('backgrounds', this)">Backgrounds</button>
    <button class="filter-pill" onclick="filterVids('social-templates', this)">Social Templates</button>
    <button class="filter-pill" onclick="filterVids('color', this)">Color & Quality</button>
    <button class="filter-pill" onclick="filterVids('3d', this)">3D & Advanced</button>
    <button class="filter-pill" onclick="filterVids('manga', this)">Manga/MMV</button>
    <button class="filter-pill" onclick="filterVids('premiere', this)">Premiere Pro</button>
    <button class="filter-pill" onclick="filterVids('plugins', this)">Plugin Tutorials</button>
  </div>

  <div class="video-grid" id="video-grid"></div>

  <div class="pagination" id="pagination"></div>

</div>

<!-- VIDEO MODAL -->
<div class="modal-overlay" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal-box">
    <div class="modal-header">
      <div class="modal-title" id="modal-title"></div>
      <div class="modal-close" onclick="closeModal()">close ✕</div>
    </div>
    <div class="modal-embed" id="modal-embed"></div>
  </div>
</div>

<script>
  // Dark mode (syncs with main site)
  function toggleDark() {
    const isDark = document.body.classList.toggle('dark-mode');
    document.getElementById('dark-toggle').textContent = isDark ? '☀️' : '🌙';
    localStorage.setItem('hunnids-theme', isDark ? 'dark' : 'light');
  }
  if (localStorage.getItem('hunnids-theme') === 'dark') {
    document.body.classList.add('dark-mode');
    document.getElementById('dark-toggle').textContent = '☀️';
  }

  // ── Tutorials: render, filter, search, paginate — all driven by tutorials-data.js ──
  const CATEGORY_LABELS = {
    basics: 'Basics',
    text: 'Text & Titles',
    transitions: 'Transitions',
    glitch: 'Glitch & CRT',
    'amv-style': 'AMV Style',
    'logos-intros': 'Logos & Intros',
    'social-templates': 'Social Templates',
    backgrounds: 'Backgrounds',
    motion: 'Motion Graphics',
    'effects-create': 'Effects',
    color: 'Color & Quality',
    '3d': '3D & Advanced',
    manga: 'Manga/MMV',
    premiere: 'Premiere Pro',
    plugins: 'Plugin Tutorials',
  };
  let PAGE_SIZE = 12; // recalculated automatically to match actual grid columns
  const ROWS_PER_PAGE = 5;

  function getColumnCount() {
    const grid = document.getElementById('video-grid');
    const cols = getComputedStyle(grid).gridTemplateColumns.split(' ').filter(Boolean).length;
    return cols || 1;
  }

  let currentCat = 'all';
  let currentQuery = '';
  let currentPage = 1;

  function tutorialThumbHTML(t) {
    const source = t.source || 'youtube';
    if (source === 'youtube') {
      return `<img src="https://img.youtube.com/vi/${t.id}/mqdefault.jpg" loading="lazy" />`;
    }
    if (t.thumb) {
      return `<img src="${t.thumb}" loading="lazy" />`;
    }
    const label = source === 'tiktok' ? 'TikTok' : 'Video';
    return `<div class="video-thumb-placeholder video-thumb-placeholder-${source}">${label}</div>`;
  }

  function videoCardHTML(t) {
    const source = t.source || 'youtube';
    const idOrUrl = source === 'youtube' ? t.id : source === 'tiktok' ? t.embedId : t.url;
    const catLabel = CATEGORY_LABELS[t.cat] || t.cat;
    return `
      <div class="video-card" onclick="openModal('${idOrUrl}','${t.title.replace(/'/g, "\\'")}','${source}')">
        <div class="video-thumb">
          ${tutorialThumbHTML(t)}
          <div class="video-thumb-overlay"><div class="video-play">▶</div></div>
          <div class="video-soft-tag">${(t.soft || '').toUpperCase()}</div>
        </div>
        <div class="video-info">
          <div class="video-title">${t.title}</div>
          <div class="video-cat">${catLabel}</div>
        </div>
      </div>`;
  }

  function getFilteredTutorials() {
    const q = currentQuery.toLowerCase().trim();
    return tutorials.filter(t => {
      const matchesCat = currentCat === 'all' || t.cat === currentCat;
      const matchesQuery = q.length === 0 ||
        t.title.toLowerCase().includes(q) ||
        (CATEGORY_LABELS[t.cat] || t.cat).toLowerCase().includes(q);
      return matchesCat && matchesQuery;
    });
  }

  function renderPagination(totalItems) {
    const el = document.getElementById('pagination');
    const totalPages = Math.max(1, Math.ceil(totalItems / PAGE_SIZE));
    if (totalPages <= 1) { el.innerHTML = ''; return; }

    let html = `<button class="page-btn" onclick="goToPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>‹</button>`;
    for (let p = 1; p <= totalPages; p++) {
      html += `<button class="page-btn ${p === currentPage ? 'active' : ''}" onclick="goToPage(${p})">${p}</button>`;
    }
    html += `<button class="page-btn" onclick="goToPage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>›</button>`;
    el.innerHTML = html;
  }

  function goToPage(p) {
    currentPage = p;
    renderTutorials();
    document.getElementById('video-grid').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function renderTutorials() {
    const cols = getColumnCount();
    PAGE_SIZE = cols * ROWS_PER_PAGE;

    const filtered = getFilteredTutorials();
    const totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
    if (currentPage > totalPages) currentPage = totalPages;

    const start = (currentPage - 1) * PAGE_SIZE;
    const pageItems = filtered.slice(start, start + PAGE_SIZE);

    const grid = document.getElementById('video-grid');
    grid.innerHTML = pageItems.length
      ? pageItems.map(videoCardHTML).join('')
      : `<div style="grid-column:1/-1; text-align:center; color:var(--text-secondary); padding:40px 0;">No tutorials found.</div>`;

    renderPagination(filtered.length);
  }

  // Recalculate page size on resize (columns can change at different widths), debounced
  let resizeTimer;
  window.addEventListener('resize', () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(() => {
      const newCols = getColumnCount();
      if (newCols * ROWS_PER_PAGE !== PAGE_SIZE) {
        currentPage = 1;
        renderTutorials();
      }
    }, 200);
  });

  // Search
  function searchTutorials(q) {
    currentQuery = q;
    currentPage = 1;
    if (q.length > 0) {
      currentCat = 'all';
      document.querySelectorAll('.filter-pill').forEach(b => b.classList.remove('active'));
    }
    renderTutorials();
  }

  // Filter
  function filterVids(cat, btn) {
    currentCat = cat;
    currentPage = 1;
    document.querySelectorAll('.filter-pill').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tutorial-search').value = '';
    currentQuery = '';
    renderTutorials();
  }

  // Modal
  function openModal(idOrUrl, title, source) {
    source = source || 'youtube';
    document.getElementById('modal-title').textContent = title;
    let embedHTML;
    if (source === 'youtube') {
      embedHTML = `<iframe src="https://www.youtube.com/embed/${idOrUrl}?autoplay=1" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
    } else if (source === 'tiktok') {
      embedHTML = `<iframe src="https://www.tiktok.com/embed/v2/${idOrUrl}" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
    } else if (source === 'file') {
      embedHTML = `<video src="${idOrUrl}" controls autoplay style="width:100%;height:100%;object-fit:contain;background:#000;"></video>`;
    }
    document.getElementById('modal-embed').innerHTML = embedHTML;
    document.getElementById('modal-box').classList.toggle('modal-vertical', source === 'tiktok');
    document.getElementById('modal').classList.add('open');
  }

  function closeModal() {
    document.getElementById('modal').classList.remove('open');
    document.getElementById('modal-embed').innerHTML = '';
    document.getElementById('modal-box').classList.remove('modal-vertical');
  }

  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
</script>

<script src="tutorials-data.js"></script>

</body>
</html>
